<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#fff5f7">
  <title>Ana's Workout 🌸</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    :root { --bg:#fff5f7; --card:#fff; --ink:#2d1520; --soft:#b08898; --line:#fce8ef; --accent:#e8799a; --accent-soft:#fdeef3; }
    body { background: var(--bg); color: var(--ink); font-family: system-ui,-apple-system,sans-serif; min-height: 100vh; }
    #page { max-width: 430px; margin: 0 auto; padding: 0 16px 60px; }

    .page-header { padding: 52px 0 16px; position: relative; }
    .page-header::after { content: '✿'; position: absolute; right: 0; top: 50px; font-size: 28px; color: var(--accent); opacity: 0.18; }
    .page-title { font-family: Georgia, serif; font-size: 24px; font-weight: 700; letter-spacing: -0.5px; }
    .page-sub { font-size: 13px; color: var(--soft); font-style: italic; margin-top: 3px; }

    .card { background: var(--card); border-radius: 20px; padding: 16px; margin-bottom: 10px; box-shadow: 0 2px 10px rgba(232,121,154,0.09); }
    .card-hero { padding: 20px; position: relative; overflow: hidden; color: #fff; border-radius: 22px; margin-bottom: 10px; }
    .hero-emoji { position: absolute; right: 14px; top: 10px; font-size: 52px; opacity: 0.2; pointer-events: none; }
    .hero-deco { position: absolute; left: 14px; bottom: 10px; font-size: 15px; opacity: 0.28; letter-spacing: 4px; pointer-events: none; }
    .hero-day { font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; opacity: 0.85; font-weight: 700; }
    .hero-title { font-family: Georgia, serif; font-size: 26px; font-weight: 700; margin-top: 2px; }
    .hero-date { font-size: 12px; opacity: 0.75; margin-top: 6px; }
    .prog-wrap { margin-top: 14px; }
    .prog-labels { display: flex; justify-content: space-between; font-size: 11px; opacity: 0.9; margin-bottom: 6px; font-weight: 600; }
    .prog-track { background: rgba(255,255,255,0.3); border-radius: 4px; height: 5px; }
    .prog-fill { background: #fff; border-radius: 4px; height: 5px; }

    .flower-strip { font-size: 15px; letter-spacing: 5px; opacity: 0.3; text-align: center; margin: 5px 0 2px; pointer-events: none; }

    .sec-label { font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--accent); font-weight: 700; margin: 14px 0 6px; display: flex; align-items: center; gap: 6px; }
    .sec-label::after { content: ''; flex: 1; height: 1px; background: var(--line); }

    .ex-row { display: flex; align-items: center; gap: 10px; padding: 9px 0; border-bottom: 1px solid var(--line); }
    .ex-row:last-child { border-bottom: none; }
    .ex-tick { width: 26px; height: 26px; border-radius: 8px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; }
    .ex-tick.done { background: var(--accent); color: #fff; box-shadow: 0 2px 6px rgba(232,121,154,0.3); }
    .ex-tick.todo { background: var(--line); color: var(--line); }
    .ex-name { flex: 1; font-size: 14px; font-weight: 500; }
    .ex-name.done { color: var(--ink); }
    .ex-name.todo { color: var(--soft); }
    .ex-sets { font-size: 11px; color: var(--soft); white-space: nowrap; }
    .ex-weight { font-size: 12px; color: var(--accent); font-weight: 700; background: var(--accent-soft); border-radius: 8px; padding: 2px 8px; white-space: nowrap; }

    .hab-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .hab-box { border-radius: 16px; padding: 12px 14px; }
    .hab-lbl { font-size: 10px; letter-spacing: 1px; text-transform: uppercase; font-weight: 700; display: block; margin-bottom: 4px; }
    .hab-val { font-size: 22px; font-weight: 700; font-family: Georgia, serif; letter-spacing: -0.5px; }
    .hab-unit { font-size: 12px; font-weight: 400; margin-left: 2px; }
    .hab-note { font-size: 10px; margin-top: 3px; }
    .hab-met { background: var(--accent-soft); }
    .hab-met .hab-lbl, .hab-met .hab-val, .hab-met .hab-note { color: var(--accent); }
    .hab-miss { background: #f7f0f3; }
    .hab-miss .hab-lbl { color: var(--soft); }
    .hab-miss .hab-val { color: #d0b0bc; }
    .hab-miss .hab-note { color: var(--soft); }

    .stat-row { display: flex; gap: 8px; }
    .stat-box { flex: 1; background: var(--card); border-radius: 16px; padding: 12px; text-align: center; box-shadow: 0 2px 8px rgba(232,121,154,0.08); }
    .stat-lbl { font-size: 10px; color: var(--soft); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 700; }
    .stat-val { font-size: 24px; font-weight: 700; font-family: Georgia, serif; letter-spacing: -1px; margin: 4px 0 0; }
    .stat-unit { font-size: 11px; color: var(--soft); }

    /* Cheer box */
    .cheer-intro { font-size: 14px; color: var(--soft); line-height: 1.6; margin-bottom: 12px; }
    .cheer-lbl { font-size: 10px; letter-spacing: 1px; text-transform: uppercase; color: var(--accent); font-weight: 700; display: block; margin-bottom: 6px; margin-top: 10px; }
    .cheer-input { width: 100%; border: 2px solid var(--line); border-radius: 12px; padding: 10px 12px; font-size: 14px; font-family: inherit; color: var(--ink); background: var(--bg); outline: none; }
    .cheer-input:focus { border-color: var(--accent); }
    .cheer-textarea { width: 100%; border: 2px solid var(--line); border-radius: 12px; padding: 10px 12px; font-size: 14px; font-family: inherit; color: var(--ink); background: var(--bg); outline: none; resize: none; min-height: 80px; margin-top: 8px; }
    .cheer-textarea:focus { border-color: var(--accent); }
    .cheer-btn { width: 100%; border: none; border-radius: 14px; background: var(--accent); color: #fff; font-size: 15px; font-weight: 700; padding: 13px; cursor: pointer; margin-top: 10px; box-shadow: 0 3px 10px rgba(232,121,154,0.3); font-family: inherit; transition: transform 0.1s; }
    .cheer-btn:active { transform: scale(0.97); }
    .cheer-hint { font-size: 12px; color: var(--soft); text-align: center; margin-top: 8px; line-height: 1.5; font-style: italic; }
    .copied-msg { font-size: 13px; color: var(--accent); font-weight: 700; text-align: center; margin-top: 8px; opacity: 0; transition: opacity 0.2s; }
    .copied-msg.show { opacity: 1; }

    /* No data */
    .no-data { text-align: center; padding: 60px 20px; }
    .no-data-emoji { font-size: 60px; display: block; margin-bottom: 16px; }
    .no-data-title { font-family: Georgia, serif; font-size: 20px; font-weight: 700; margin-bottom: 10px; }
    .no-data-text { font-size: 14px; color: var(--soft); line-height: 1.7; }

    /* Notes */
    .notes-box { background: var(--accent-soft); border-radius: 14px; padding: 12px 14px; font-size: 14px; color: var(--ink); line-height: 1.6; font-style: italic; }
    .notes-box::before { content: '"'; font-family: Georgia, serif; font-size: 24px; color: var(--accent); opacity: 0.5; line-height: 0; vertical-align: -8px; margin-right: 4px; }
  </style>
</head>
<body>
<div id="page">
  <div class="page-header">
    <div class="page-title">Ana's Progress 🌸</div>
    <div class="page-sub" id="page-sub">Loading...</div>
  </div>
  <div id="content"></div>
</div>

<script>
const W = {
  1:{name:'Monday',title:'Lower Body',emoji:'🍑',color:'#e8a0b4',corr:true,sections:[
    {label:'Main Lifts',exercises:[
      {id:'hip_thrust',name:'Barbell hip thrusts',sets:'4×8–10'},
      {id:'rdl',name:'Romanian deadlifts',sets:'4×10'},
      {id:'bss',name:'Bulgarian split squats',sets:'3×10 ea'},
      {id:'leg_press',name:'Leg press',sets:'3×12'},
    ]},
    {label:'Accessories',exercises:[
      {id:'kickback',name:'Cable kickbacks',sets:'3×15'},
      {id:'abductor',name:'Hip abductor machine',sets:'3×15'},
      {id:'calves',name:'Calf raises',sets:'3×15'},
    ]},
    {label:'Finish',exercises:[
      {id:'incline_walk',name:'Incline treadmill walk',sets:'15 min',nw:true},
    ]},
  ]},
  2:{name:'Tuesday',title:'Pilates + Walk',emoji:'🌿',color:'#88c4a8',light:true,items:[
    {id:'corr',label:'Posture corrective block',detail:'10 min'},
    {id:'pilates',label:'Pilates session',detail:'45 min'},
    {id:'steps_i',label:'Steps target',detail:'8–10k'},
  ]},
  3:{name:'Wednesday',title:'Upper Body',emoji:'🌸',color:'#a890d0',corr:true,sections:[
    {label:'Back + Shoulders',exercises:[
      {id:'lat_pull',name:'Lat pulldowns',sets:'4×10'},
      {id:'cable_row',name:'Seated cable rows',sets:'4×10'},
      {id:'face_pull',name:'Face pulls',sets:'3×15'},
      {id:'rear_delt',name:'Rear delt flyes',sets:'3×12'},
      {id:'sh_press',name:'DB shoulder press',sets:'3×10'},
    ]},
    {label:'Arms',exercises:[
      {id:'bicep',name:'Bicep curls',sets:'3×12'},
      {id:'tricep',name:'Tricep pushdowns',sets:'3×12'},
    ]},
    {label:'Core',exercises:[
      {id:'dead_bug',name:'Dead bugs',sets:'3×12',nw:true},
      {id:'cable_crunch',name:'Cable crunches',sets:'3×15'},
      {id:'plank',name:'Plank',sets:'3×30–45s',nw:true},
    ]},
  ]},
  4:{name:'Thursday',title:'Active Recovery',emoji:'🌼',color:'#d8b870',light:true,items:[
    {id:'walk_i',label:'Long walk',detail:'30–45 min'},
    {id:'stretch',label:'Stretching / mobility',detail:'20 min'},
    {id:'opt_pil',label:'Optional: light Pilates',detail:''},
  ]},
  5:{name:'Friday',title:'Full Body',emoji:'🔥',color:'#e07898',corr:true,sections:[
    {label:'Compound Lifts',exercises:[
      {id:'deadlift',name:'Deadlifts / Trap bar',sets:'4×6–8'},
      {id:'goblet',name:'Goblet squats',sets:'3×12'},
      {id:'db_bench',name:'DB bench press',sets:'3×10'},
      {id:'db_row',name:'Single-arm DB rows',sets:'3×10 ea'},
      {id:'fri_thr',name:'Hip thrusts',sets:'3×12'},
      {id:'farmer',name:'Farmer carries',sets:'3×30m',nw:true},
    ]},
  ]},
  6:{name:'Saturday',title:'Cardio',emoji:'🌷',color:'#78b0d0',light:true,items:[
    {id:'run',label:'Run / jog'},{id:'cycle',label:'Cycling'},
    {id:'rowing',label:'Rowing machine'},{id:'swim',label:'Swimming'},
  ]},
  0:{name:'Sunday',title:'Rest Day',emoji:'🐰',color:'#a8c890',rest:true},
};

const CORR=[
  {id:'dh',label:'Dead hangs',detail:'3×20–30s'},
  {id:'fp',label:'Face pulls',detail:'3×15'},
  {id:'bp',label:'Band pull-aparts',detail:'3×20'},
  {id:'wa',label:'Wall angels',detail:'2×10'},
  {id:'hf',label:'Hip flexor stretch',detail:'60s each'},
  {id:'ct',label:'Chin tucks',detail:'2×10'},
];

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// ── DECODE DATA FROM URL ───────────────────────────────────────
function getData(){
  const hash=location.hash.slice(1);
  if(!hash)return null;
  try{ return JSON.parse(decodeURIComponent(escape(atob(hash)))); }
  catch(e){ return null; }
}

// ── RENDER ─────────────────────────────────────────────────────
function render(data){
  const wo=W[data.dow];
  const dateStr=new Date(data.date+'T12:00:00').toLocaleDateString('en-AU',{weekday:'long',day:'numeric',month:'long'});
  document.getElementById('page-sub').textContent=dateStr;

  const allEx=wo.sections?wo.sections.flatMap(s=>s.exercises):(wo.items||[]);
  let doneCount=0, total=allEx.length;
  if(wo.sections) doneCount=wo.sections.flatMap(s=>s.exercises).filter(e=>data.exercises?.[e.id]?.done).length;
  else if(wo.items) doneCount=(wo.items||[]).filter(i=>data.items?.[i.id]).length;
  const pct=total?Math.round(doneCount/total*100):0;

  let h='';

  // Hero card
  h+=`<div class="card-hero" style="background:${wo.color};">
    <div class="hero-emoji">${wo.emoji}</div>
    <div class="hero-deco">✿ ❀ ✿</div>
    <div class="hero-day">${wo.name}</div>
    <div class="hero-title">${wo.title}</div>
    <div class="hero-date">${dateStr}</div>
    ${total?`<div class="prog-wrap">
      <div class="prog-labels"><span>${doneCount}/${total} done</span><span>${pct}%</span></div>
      <div class="prog-track"><div class="prog-fill" style="width:${pct}%"></div></div>
    </div>`:''}
  </div>
  <div class="flower-strip">🌸 🌷 🌼 🌸 🌷 🌼</div>`;

  // Exercises
  if(wo.rest){
    h+=`<div class="card" style="text-align:center;padding:32px 20px;">
      <div style="font-size:44px;margin-bottom:10px;">🐰</div>
      <div style="font-family:Georgia,serif;font-size:17px;font-weight:700;margin-bottom:6px;">Rest Day</div>
      <div style="font-size:13px;color:var(--soft);">Recovery is part of the work 🌸</div>
    </div>`;
  } else if(wo.sections){
    if(wo.corr){
      const corrDone=CORR.filter(c=>data.correctives?.[c.id]).length;
      const allCorrDone=corrDone===CORR.length;
      h+=`<div class="sec-label">Posture Correctives</div><div class="card" style="border-left:4px solid ${allCorrDone?'var(--accent)':'var(--line)'}">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
          <div style="font-size:14px;font-weight:700;">Corrective block 🌸</div>
          <div style="font-size:12px;font-weight:700;color:${allCorrDone?'var(--accent)':'var(--soft)'};">${corrDone}/${CORR.length}</div>
        </div>
        ${CORR.map(c=>{const done=!!data.correctives?.[c.id];return`<div class="ex-row">
          <div class="ex-tick ${done?'done':'todo'}">${done?'✓':''}</div>
          <div class="ex-name ${done?'done':'todo'}">${esc(c.label)}</div>
          <div class="ex-sets">${esc(c.detail)}</div>
        </div>`;}).join('')}
      </div>`;
    }
    wo.sections.forEach(sec=>{
      h+=`<div class="sec-label">${esc(sec.label)}</div><div class="card">`;
      h+=sec.exercises.map(ex=>{
        const done=!!data.exercises?.[ex.id]?.done;
        const wt=data.exercises?.[ex.id]?.weight;
        return`<div class="ex-row">
          <div class="ex-tick ${done?'done':'todo'}">${done?'✓':''}</div>
          <div class="ex-name ${done?'done':'todo'}">${esc(ex.name)}</div>
          ${wt?`<div class="ex-weight">${esc(wt)} kg</div>`:`<div class="ex-sets">${esc(ex.sets)}</div>`}
        </div>`;
      }).join('');
      h+=`</div>`;
    });
  } else if(wo.light){
    h+=`<div class="sec-label">Today's Plan</div><div class="card">`;
    h+=(wo.items||[]).map(item=>{
      const done=!!data.items?.[item.id];
      return`<div class="ex-row">
        <div class="ex-tick ${done?'done':'todo'}">${done?'✓':''}</div>
        <div class="ex-name ${done?'done':'todo'}">${esc(item.label)}</div>
        ${item.detail?`<div class="ex-sets">${esc(item.detail)}</div>`:''}
      </div>`;
    }).join('');
    h+=`</div>`;
  }

  // Habits
  if(!wo.rest){
    const habits=[
      {key:'protein',lbl:'Protein',unit:'g',target:120},
      {key:'steps',lbl:'Steps',unit:'',target:8000},
      {key:'water',lbl:'Water',unit:'L',target:2},
      {key:'sleep',lbl:'Sleep',unit:'h',target:7},
    ];
    h+=`<div class="sec-label">Today's Habits</div><div class="hab-grid">`;
    habits.forEach(hb=>{
      const val=data[hb.key];
      const num=parseFloat(val);
      const met=!isNaN(num)&&num>=hb.target;
      if(val){
        h+=`<div class="hab-box ${met?'hab-met':'hab-miss'}">
          <span class="hab-lbl">${hb.lbl}</span>
          <div class="hab-val">${esc(val)}<span class="hab-unit">${hb.unit}</span></div>
          <div class="hab-note">${met?'✓ target hit':'target: '+hb.target+hb.unit}</div>
        </div>`;
      } else {
        h+=`<div class="hab-box hab-miss">
          <span class="hab-lbl">${hb.lbl}</span>
          <div class="hab-val" style="color:var(--line);">—</div>
          <div class="hab-note">target: ${hb.target}${hb.unit}</div>
        </div>`;
      }
    });
    h+=`</div>`;

    // Notes
    if(data.notes){
      h+=`<div class="sec-label">Ana's notes</div>
      <div class="notes-box">${esc(data.notes)}</div>`;
    }
  }

  // Weight progress
  const prog=(data.progress||[]).sort((a,b)=>a.date.localeCompare(b.date));
  if(prog.length>=2){
    const start=prog[0].weight, latest=prog[prog.length-1].weight;
    const change=(latest-start).toFixed(1);
    h+=`<div class="sec-label">Weight Progress</div>
    <div class="stat-row">
      <div class="stat-box"><div class="stat-lbl">Start</div><div class="stat-val">${start}</div><div class="stat-unit">kg</div></div>
      <div class="stat-box"><div class="stat-lbl">Now</div><div class="stat-val">${latest}</div><div class="stat-unit">kg</div></div>
      <div class="stat-box"><div class="stat-lbl">Change</div>
        <div class="stat-val" style="color:${parseFloat(change)<=0?'#6aab7e':'#e87898'}">${parseFloat(change)>0?'+':''}${change}</div>
        <div class="stat-unit">kg</div>
      </div>
    </div>`;
  }

  // Cheer box
  h+=`<div class="sec-label">Leave a cheer 🌷</div>
  <div class="card">
    <div class="cheer-intro">Send Ana some encouragement! Write your message below, copy it, then paste it in WhatsApp or iMessage.</div>
    <span class="cheer-lbl">Your name</span>
    <input class="cheer-input" id="cheer-name" placeholder="e.g. Yomi" maxlength="30">
    <textarea class="cheer-textarea" id="cheer-msg" placeholder="Write something lovely... 🌸" maxlength="300"></textarea>
    <button class="cheer-btn" onclick="copyCheer()">Copy cheer to send 🌸</button>
    <div class="cheer-hint">Then paste it in WhatsApp or iMessage to Ana!</div>
    <div class="copied-msg" id="copied-msg">Copied! Now go send it 🌷</div>
  </div>`;

  document.getElementById('content').innerHTML=h;
}

function copyCheer(){
  const name=document.getElementById('cheer-name')?.value?.trim()||'Your friend';
  const msg=document.getElementById('cheer-msg')?.value?.trim();
  if(!msg){document.getElementById('cheer-msg')?.focus();return;}
  const text=`${name}: ${msg} 🌸`;
  navigator.clipboard.writeText(text).then(()=>{
    const el=document.getElementById('copied-msg');
    if(el){el.classList.add('show');setTimeout(()=>el.classList.remove('show'),3000);}
  }).catch(()=>{
    // Fallback for browsers without clipboard API
    const ta=document.createElement('textarea');
    ta.value=text; document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
    const el=document.getElementById('copied-msg');
    if(el){el.classList.add('show');setTimeout(()=>el.classList.remove('show'),3000);}
  });
}

function renderNoData(){
  document.getElementById('page-sub').textContent='Ask Ana to share today\'s link!';
  document.getElementById('content').innerHTML=`<div class="no-data">
    <span class="no-data-emoji">🐰</span>
    <div class="no-data-title">No data here yet!</div>
    <div class="no-data-text">Ask Ana to tap <strong>"Share today 🌸"</strong> in her app<br>and send you the link.<br><br>Each day she shares a fresh link<br>so you can see how she's going 🌷</div>
  </div>`;
}

// ── INIT ───────────────────────────────────────────────────────
const data=getData();
if(data) render(data);
else renderNoData();
</script>
</body>
</html>
